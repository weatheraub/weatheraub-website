<!DOCTYPE html>

	<title>WeatherAub</title>
	<style>
		* {
			box-sizing: border-box;
		}

		html,
		body {
			height: 100%;
			margin: 0;
		}

		body {
			display: flex;
			align-items: center;
			justify-content: center;
			background: #ffffff;
			font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
		}

		.hero {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 1rem;
		}

		.site-name {
			font-size: clamp(1.5rem, 2vw, 3rem);
			font-weight: 600;
			color: #000000;
			letter-spacing: 0.0em;
		}

		.social-row {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.9rem;
			flex-wrap: wrap;
		}

		.social-link {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 2.1rem;
			height: 2.1rem;
			color: #111111;
			border-radius: 999px;
			text-decoration: none;
			transition: transform 140ms ease, background-color 140ms ease, color 140ms ease;
		}

		.social-link svg {
			width: 1.15rem;
			height: 1.15rem;
			fill: currentColor;
		}

		.social-link:hover,
		.social-link:focus-visible {
			background: #f2f2f2;
			transform: translateY(-2px);
			outline: none;
		}
	</style>
</head>
